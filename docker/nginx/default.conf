server {
    listen 80;
    listen [::]:80;
    server_name _;
    server_tokens off;

    root /usr/share/nginx/html;
    index index.html;
    error_page 404 /404.html;

    include /etc/nginx/snippets/security-headers.conf;

    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location = / {
        try_files /index.html =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    location ~ /\.(?!well-known) {
        return 404;
    }

    location = /404.html {
        internal;
        default_type text/html;
        return 404 "<!doctype html><html lang=\"en\"><head><meta charset=\"utf-8\"><title>404 Not Found</title></head><body><h1>404 Not Found</h1></body></html>\n";
    }

    location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|wav|mp3|mid)$ {
        include /etc/nginx/snippets/security-headers.conf;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }
}
